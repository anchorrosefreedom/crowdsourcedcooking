<script>
function doSave() {
  var auth = firebase.auth();
  var user = auth.currentUser;
  if (!user) {
    alert('Please login first');
    return;
  }
  var t=document.getElementById("title").value;if(!t){alert("Enter title");return}
  var i=document.getElementById("ingredients").value.split("\n").filter(function(x){return x.trim()});var ins=document.getElementById("instructions").value;var a=document.getElementById("author").value||"Anon";var d=document.getElementById("description").value;var cat=document.getElementById("category").value;
  var c=document.querySelectorAll("input[name=tags]:checked");var tags=[];c.forEach(function(el){tags.push(el.value)});var customInputs=document.querySelectorAll(".custom-tags");customInputs.forEach(function(ci){if(ci.value.trim()){tags.push(ci.value.trim())}});
  var imgInput = document.getElementById('photo-container img');
  var imgSrc = document.querySelector('#photo-container img') ? document.querySelector('#photo-container img').src : '';
  var auth = firebase.auth();
    var userId = null;
    auth.onAuthStateChanged(function(u) { userId = u ? u.uid : null; });
    var mimoFrom = new URLSearchParams(window.location.search).get('mimo');
    var mimoFrom = new URLSearchParams(window.location.search).get('mimo');
  var data={title:t,description:d,ingredients:i,instructions:ins,author:a,authorId:user.uid,mimoFrom:mimoFrom,category:cat,tags:tags,image:imgSrc,createdAt:new Date().toISOString()};var btn=document.querySelector("button[onclick='doSave()']");btn.textContent="Saving...";
  fetch("https://us-central1-crowdsourcedcooking.cloudfunctions.net/saveRecipe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}).then(function(r){return r.json()}).then(function(x){var form = document.querySelector('form'); form.innerHTML = '<div style="background:white;padding:2rem;border-radius:12px;text-align:center"><h2 style="color:#2a9d8f;font-size:1.5rem;margin-bottom:1rem">✓ Recipe Saved!</h2><p style="margin-bottom:1rem">Your recipe has been submitted successfully.</p><a href="recipe.html?id='+x.id+'" style="background:#2a9d8f;color:white;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none;display:inline-block">View Recipe</a></div>'}).catch(function(e){alert("Error: "+e.message);btn.textContent="Save Failed"})}

function importRecipe() {
  var url = document.getElementById('sourceUrl').value.trim();
  if(!url) { document.getElementById('import-status').textContent = 'Enter URL'; return; }
  document.getElementById('import-status').textContent = 'Importing...';
  fetch('https://us-central1-crowdsourcedcooking.cloudfunctions.net/importRecipe', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url: url})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.error) throw new Error(d.error);
    if(d.recipe && d.recipe.title) {
      var r = d.recipe;
      document.getElementById('title').value = r.title || '';
      if (r.author) {
        var domain = r.author.replace('www.', '');
        document.getElementById('author').value = domain;
      }
      document.getElementById('description').value = r.description || '';
      document.getElementById('ingredients').value = typeof r.ingredients === 'string' ? r.ingredients : (r.ingredients || []).join('\n');
      document.getElementById('instructions').value = typeof r.instructions === 'string' ? r.instructions : (r.instructions || []).join('\n');
      // Display imported image
      if (r.image) {
        var imgDiv = document.getElementById('photo-container');
        if (imgDiv) {
          imgDiv.innerHTML = '<img src="' + r.image + '" style="max-width:100%;max-height:300px;border-radius:8px">';
        }
      }
      document.getElementById('import-status').textContent = 'Imported!';
    } else if(d.title) {
      document.getElementById('title').value = d.title || '';
      document.getElementById('description').value = d.description || '';
      document.getElementById('ingredients').value = (d.ingredients || []).join('\n');
      document.getElementById('instructions').value = (d.instructions || []).join('\n');
      // Display imported image
      if (r.image) {
        var imgDiv = document.getElementById('photo-container');
        if (imgDiv) {
          imgDiv.innerHTML = '<img src="' + r.image + '" style="max-width:100%;max-height:300px;border-radius:8px">';
        }
      }
      document.getElementById('import-status').textContent = 'Imported!';
    } else {
      document.getElementById('import-status').textContent = 'No recipe found';
    }
  }).catch(function(e){ document.getElementById('import-status').textContent = 'Error: '+e.message; });
}

function handleImageSelect(event) {
  var files = event.target.files;
  var container = document.getElementById('photo-container');
  container.innerHTML = '';
  for(var i=0; i<Math.min(files.length, 10); i++) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = document.createElement('img');
      img.src = e.target.result;
      img.style = 'max-width:200px;max-height:200px;margin:5px;border-radius:8px';
      container.appendChild(img);
    };
    reader.readAsDataURL(files[i]);
  }
  var counter = document.getElementById('photo-counter');
  counter.style.display = 'block';
  counter.textContent = files.length + '/10';
}

function toggleDropdown(id) {
  console.log('toggleDropdown called with:', id);
  var dropdown = document.getElementById(id+'-dropdown');
  if (!dropdown) {
    console.log('dropdown not found for:', id);
    alert('Toggle: ' + id);
    return;
  }
  console.log('dropdown found:', dropdown);
  var current = dropdown.style.display;
  console.log('current display:', current);
  if (current === 'none' || current === '') {
    dropdown.style.display = 'block';
  } else {
    dropdown.style.display = 'none';
  }
  console.log('new display:', dropdown.style.display);
}

        var mimoNote = document.createElement('div');
        mimoNote.style = 'background:#fff3cd;padding:1rem;border-radius:8px;margin-bottom:1rem;color:#856404';
        mimoNote.textContent = 'You are editing a COPY of this recipe. Your changes will create a new MiMO recipe that only you can see.';
        var form = document.querySelector('form');
        if (form) form.insertBefore(mimoNote, form.firstChild);
        
        // Fetch original recipe
        db.collection('recipes').doc(mimoId).get().then(function(doc) {
          if (doc.exists) {
            var r = doc.data();
            document.getElementById('title').value = r.title || '';
            document.getElementById('author').value = r.author || '';
            document.getElementById('description').value = r.description || '';
            document.getElementById('ingredients').value = Array.isArray(r.ingredients) ? r.ingredients.join('\n') : (r.ingredients || '');
            document.getElementById('instructions').value = typeof r.instructions === 'string' ? r.instructions : ((r.instructions || []).join('\n'));
            var srcLink = document.getElementById('recipeSourceLink');
            if (srcLink) srcLink.value = r.sourceUrl || '';
            
            // Show original image
            if (r.image) {
              var imgDiv = document.getElementById('photo-container');
              if (imgDiv) imgDiv.innerHTML = '<img src="' + r.image + '" style="max-width:100%;max-height:300px;border-radius:8px">';
            }
          }
        }).catch(function(err) { console.error('Error loading MiMO recipe:', err); });
      }
    })();
  </script>
</body>
