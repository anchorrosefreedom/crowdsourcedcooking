<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Recipe - CrowdSourced Cooking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 700px; margin: 0 auto; padding: 40px; }
    h1 { color: #333; margin-bottom: 5px; text-align: center; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
    .form-row { display: flex; gap: 20px; }
    .form-row > div { flex: 1; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
    input, select, textarea { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; font-family: inherit; transition: border-color 0.3s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
    textarea { min-height: 120px; resize: vertical; }
    .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #dc3545; font-size: 14px; margin-top: 10px; display: none; padding: 10px; background: #f8d7da; border-radius: 5px; }
    .success { color: #28a745; font-size: 14px; margin-top: 10px; display: none; padding: 10px; background: #d4edda; border-radius: 5px; text-align: center; }
    .login-prompt { text-align: center; padding: 40px; }
    .login-prompt a { color: #667eea; font-weight: 600; }
    .nav { text-align: center; margin-bottom: 20px; }
    .nav a { color: #667eea; text-decoration: none; margin: 0 10px; }
    .user-info { text-align: right; margin-bottom: 20px; font-size: 14px; color: #666; }
    .user-info span { font-weight: 600; color: #333; }
    .file-upload { border: 2px dashed #e0e0e0; border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; transition: border-color 0.3s, background 0.3s; }
    .file-upload:hover { border-color: #667eea; background: #f8f9fa; }
    .file-upload.dragover { border-color: #667eea; background: #f0f4ff; }
    .file-upload input { display: none; }
    .file-upload-icon { font-size: 40px; margin-bottom: 10px; }
    .file-upload-text { color: #666; }
    .file-upload-text strong { color: #667eea; }
    .preview-image { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 15px; display: none; }
    .file-required-note { font-size: 12px; color: #dc3545; margin-top: 5px; }
    .file-optional-note { font-size: 12px; color: #28a745; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="index.html">🏠 Home</a>
      <a href="login.html">🔐 Login</a>
    </div>
    
    <div id="login-required" class="login-prompt">
      <h2>Please Login to Submit a Recipe</h2>
      <p style="margin: 15px 0; color: #666;">You need an account to share your recipes with the community.</p>
      <a href="login.html" class="btn" style="display: inline-block; width: auto; padding: 14px 30px;">Login / Register</a>
    </div>
    
    <div id="recipe-form" style="display: none;">
      <h1>🍳 Submit Your Recipe</h1>
      <p class="subtitle">Share your culinary creation with the community</p>
      
      <div class="user-info" id="user-info"></div>
      
      <form id="submit-recipe">
        <div class="form-group">
          <label>Recipe Title *</label>
          <input type="text" id="title" placeholder="e.g., Grandma's Famous Chili" required>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Category *</label>
            <select id="category" required>
              <option value="">Select a category</option>
              <option value="Main Dishes">Main Dishes</option>
              <option value="Meats">Meats</option>
              <option value="Side Dishes">Side Dishes</option>
              <option value="Breakfasts">Breakfasts</option>
              <option value="Breads">Breads</option>
              <option value="Desserts">Desserts</option>
              <option value="Drinks">Drinks</option>
            </select>
          </div>
          <div class="form-group">
            <label>Prep Time (minutes)</label>
            <input type="number" id="prepTime" placeholder="15" min="0">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Cook Time (minutes)</label>
            <input type="number" id="cookTime" placeholder="30" min="0">
          </div>
          <div class="form-group">
            <label>Servings</label>
            <input type="number" id="servings" placeholder="4" min="1">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Your User ID</label>
            <input type="text" id="userId" readonly style="background: #f5f5f5; color: #666;">
          </div>
        </div>

        <div class="form-group">
          <label>Recipe Photo</label>
          <div class="file-upload" id="file-upload">
            <input type="file" id="recipe-image" accept="image/*">
            <div class="file-upload-icon">📷</div>
            <div class="file-upload-text">
              <strong>Click to upload</strong> or drag and drop<br>
              <span id="file-note" class="file-required-note">Required for new recipes</span>
            </div>
            <img id="preview-image" class="preview-image">
          </div>
        </div>
        
        <div class="form-group">
          <label>Ingredients *</label>
          <textarea id="ingredients" placeholder="List each ingredient on a new line:&#10;2 cups flour&#10;1 tsp salt&#10;3 eggs" required></textarea>
        </div>
        
        <div class="form-group">
          <label>Instructions *</label>
          <textarea id="instructions" placeholder="Step-by-step instructions:&#10;1. Preheat oven to 350°F&#10;2. Mix dry ingredients&#10;3. Add wet ingredients and stir" required></textarea>
        </div>
        
        <button type="submit" class="btn" id="submit-btn">Submit Recipe</button>
        <p class="error" id="error"></p>
        <p class="success" id="success"></p>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBk3w4fTG2RZGBJ7VWZg1kKvPBc5bqWlzk",
      authDomain: "crowdsourcedcooking.firebaseapp.com",
      projectId: "crowdsourcedcooking",
      storageBucket: "crowdsourcedcooking.firebasestorage.app",
      messagingSenderId: "1025589287082",
      appId: "1:1025589287082:web:15569e323aa2781ab858d3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    let selectedFile = null;
    let isFork = false;

    // Check if this is a fork (editing existing recipe)
    const urlParams = new URLSearchParams(window.location.search);
    const originalRecipeId = urlParams.get('fork');
    if (originalRecipeId) {
      isFork = true;
      document.querySelector('h1').textContent = '🍳 Fork a Recipe';
      document.querySelector('.subtitle').textContent = 'Modify this recipe and make it your own!';
      document.getElementById('file-note').textContent = 'Optional - keep original image if empty';
      document.getElementById('file-note').className = 'file-optional-note';
    }

    onAuthStateChanged(auth, user => {
      if (user) {
        currentUser = user;
        document.getElementById('login-required').style.display = 'none';
        document.getElementById('recipe-form').style.display = 'block';
        document.getElementById('user-info').innerHTML = `Logged in as: <span>${user.displayName || user.email}</span> | <a href="#" onclick="logout()">Logout</a>`;
        document.getElementById('userId').value = user.uid;
      } else {
        document.getElementById('login-required').style.display = 'block';
        document.getElementById('recipe-form').style.display = 'none';
      }
    });

    window.logout = function() {
      signOut(auth);
    };

    // File upload handling
    const fileInput = document.getElementById('recipe-image');
    const fileUpload = document.getElementById('file-upload');
    const previewImage = document.getElementById('preview-image');

    fileUpload.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        selectedFile = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImage.src = e.target.result;
          previewImage.style.display = 'block';
        };
        reader.readAsDataURL(selectedFile);
      }
    });

    // Drag and drop
    fileUpload.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileUpload.classList.add('dragover');
    });
    fileUpload.addEventListener('dragleave', () => fileUpload.classList.remove('dragover'));
    fileUpload.addEventListener('drop', (e) => {
      e.preventDefault();
      fileUpload.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        selectedFile = e.dataTransfer.files[0];
        fileInput.files = e.dataTransfer.files;
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImage.src = e.target.result;
          previewImage.style.display = 'block';
        };
        reader.readAsDataURL(selectedFile);
      }
    });

    document.getElementById('submit-recipe').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      
      if (!currentUser) {
        errorEl.textContent = 'Please login first';
        errorEl.style.display = 'block';
        return;
      }

      // Check image requirement
      if (!isFork && !selectedFile) {
        errorEl.textContent = 'Please upload a photo for new recipes';
        errorEl.style.display = 'block';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = 'Uploading image...';
      errorEl.style.display = 'none';
      successEl.style.display = 'none';
      
      try {
        let imageUrl = null;
        
        // Upload image if provided
        if (selectedFile) {
          const storageRef = ref(storage, `recipes/${Date.now()}_${selectedFile.name}`);
          await uploadBytes(storageRef, selectedFile);
          imageUrl = await getDownloadURL(storageRef);
        }
        
        const recipe = {
          title: document.getElementById('title').value,
          category: document.getElementById('category').value,
          prepTime: parseInt(document.getElementById('prepTime').value) || 0,
          cookTime: parseInt(document.getElementById('cookTime').value) || 0,
          servings: parseInt(document.getElementById('servings').value) || 1,
          ingredients: document.getElementById('ingredients').value,
          instructions: document.getElementById('instructions').value,
          authorId: currentUser.uid,
          userId: document.getElementById('userId').value,
          authorEmail: currentUser.email,
          authorName: currentUser.displayName || currentUser.email.split('@')[0],
          imageUrl: imageUrl,
          upvotes: 0,
          downvotes: 0,
          createdAt: serverTimestamp()
        };
        
        await addDoc(collection(db, 'recipes'), recipe);
        
        successEl.textContent = 'Recipe submitted successfully! Redirecting...';
        successEl.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
        
      } catch (err) {
        errorEl.textContent = 'Error: ' + err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Submit Recipe';
      }
    });
  </script>
</body>
</html>
