<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CrowdSourced Cooking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 420px; padding: 40px; }
    h1 { color: #264653; margin-bottom: 10px; font-size: 28px; text-align: center; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
    .tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid #eee; }
    .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #666; font-weight: 600; transition: all 0.3s; }
    .tab.active { color: #2a9d8f; border-bottom: 2px solid #2a9d8f; margin-bottom: -2px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
    input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: border-color 0.3s; }
    input:focus { outline: none; border-color: #2a9d8f; }
    .btn { width: 100%; padding: 16px; background: #2a9d8f; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, background 0.2s; margin-bottom: 15px; }
    .btn:hover { transform: translateY(-2px); background: #21867a; }
    .btn-google { background: #264653; }
    .divider { text-align: center; color: #999; margin: 20px 0; position: relative; }
    .divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 1px; background: #eee; }
    .divider span { background: white; padding: 0 15px; position: relative; }
    .user-info { display: none; text-align: center; padding: 20px; }
    .user-info.show { display: block; }
    .nav-bar { margin-bottom: 20px; text-align: center; }
    .nav-bar a { color: #2a9d8f; text-decoration: none; margin: 0 10px; font-weight: 500; }
    .nav-bar a:hover { text-decoration: underline; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; background: #2a9d8f; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; }
    .btn-logout { background: #c0392b; }
    .error { color: #dc3545; font-size: 14px; margin-top: 10px; display: none; }
    .tabs-content > div { display: none; }
    .tabs-content > div.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-bar" id="nav-bar">
      <a href="index.html">Home</a> |
      <a href="about.html">About</a> |
      <a href="categories.html">Recipes</a> |
      <a href="keto.html">Diets</a> |
      <a href="submit-recipe.html">Submit Recipe</a>
    </div>
    <h1>🍳 CrowdSourced Cooking</h1>
    <p class="subtitle">Join our community of recipe creators</p>
    
    <div class="tabs">
      <div class="tab active" data-tab="login">Login</div>
      <div class="tab" data-tab="register">Register</div>
    </div>
    
    <div class="tabs-content">
      <!-- Login Form -->
      <div id="login-form" class="active">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="login()">Login</button>
        <div class="divider"><span>or</span></div>
        <button class="btn btn-google" onclick="loginGoogle()">Continue with Google</button>
        <p class="error" id="login-error"></p>
      </div>
      
      <!-- Register Form -->
      <div id="register-form">
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="register-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="register-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="register-password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="register()">Create Account</button>
        <div class="divider"><span>or</span></div>
        <button class="btn btn-google" onclick="loginGoogle()">Continue with Google</button>
        <p class="error" id="register-error"></p>
      </div>
    </div>
    
    <!-- Logged In User Info -->
    <div class="user-info" id="user-info">
      <div class="avatar" id="user-avatar">👤</div>
      <h2 id="user-name">Welcome!</h2>
      <p id="user-email" style="color: #666; margin: 10px 0;"></p>
      <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBk3w4fTG2RZGBJ7VWZg1kKvPBc5bqWlzk",
      authDomain: "crowdsourcedcooking.firebaseapp.com",
      projectId: "crowdsourcedcooking",
      storageBucket: "crowdsourcedcooking.firebasestorage.app",
      messagingSenderId: "1025589287082",
      appId: "1:1025589287082:web:15569e323aa2781ab858d3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    window.login = function() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      
      signInWithEmailAndPassword(auth, email, password)
        .then(() => { window.location.href = 'index.html'; })
        .catch(err => { errorEl.textContent = err.message; errorEl.style.display = 'block'; });
    };

    window.register = function() {
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const errorEl = document.getElementById('register-error');
      
      if (!name) { errorEl.textContent = 'Please enter your name'; errorEl.style.display = 'block'; return; }
      
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => { window.location.href = 'index.html'; })
        .catch(err => { errorEl.textContent = err.message; errorEl.style.display = 'block'; });
    };

    window.loginGoogle = function() {
      signInWithPopup(auth, googleProvider)
        .then(() => { window.location.href = 'index.html'; })
        .catch(err => { alert(err.message); });
    };

    window.logout = function() {
      signOut(auth);
    };

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tabs-content > div').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-form').classList.add('active');
      });
    });

    // Auth state listener
    onAuthStateChanged(auth, user => {
      const forms = document.querySelectorAll('.tabs-content > div');
      const userInfo = document.getElementById('user-info');
      
      
      if (user) {
        forms.forEach(f => f.style.display = 'none');
        document.querySelector('.tabs').style.display = 'none';
        userInfo.classList.add('show');
        
        document.getElementById('user-name').textContent = `Welcome, ${user.displayName || user.email}!`;
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-avatar').textContent = user.photoURL ? '� foto' : (user.displayName ? user.displayName[0].toUpperCase() : '👤');
      } else {
        forms.forEach(f => f.style.display = '');
        document.querySelector('.tabs').style.display = 'flex';
        userInfo.classList.remove('show');
        
      }
    });
  </script>
</body>
</html>
