<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Submitted - CrowdSourced Cooking</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
    .container { background: white; padding: 3rem; border-radius: 16px; text-align: center; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .checkmark { font-size: 4rem; margin-bottom: 1rem; }
    h1 { color: #2a9d8f; margin: 0 0 1rem 0; }
    p { color: #666; font-size: 1.1rem; line-height: 1.6; }
    .btn { display: inline-block; background: #2a9d8f; color: white; padding: 1rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: 1.5rem; transition: transform 0.2s; }
    .btn:hover { transform: scale(1.05); }
    .btn-home { background: #666; margin-left: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">✅</div>
    <h1>Recipe Submitted!</h1>
    <p>Your recipe has been successfully submitted to CrowdSourced Cooking.</p>
    <a href="recipe.html" class="btn">View My Recipe</a>
    <a href="index.html" class="btn btn-home">Go to Homepage</a>
  </div>
</body>
</html>
