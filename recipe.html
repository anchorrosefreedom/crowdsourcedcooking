<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe - CrowdSourced Cooking</title>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.6;color:#333;background:#f8f9fa}
header{background:#fff;padding:1rem 2rem;box-shadow:0 2px 10px rgba(0,0,0,.08)}
nav,a{color:#2a9d8f;text-decoration:none;font-weight:500}
main{max-width:800px;margin:2rem auto;padding:1rem}
h1{color:#264653;font-size:1.8rem;margin:.5rem 0}
.author{color:#666;font-size:.9rem}
.desc{margin:1rem 0}
.section{background:#fff;padding:1.5rem;border-radius:12px;margin:1rem 0;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h2{color:#264653;font-size:1.2rem;margin:1rem 0;border-bottom:2px solid #2a9d8f;padding-bottom:.5rem}
ul{list-style:none}
ul li{padding:.5rem 0}
ul li:before{content:"• ";color:#2a9d8f;margin-right:.5rem}
ol{margin-left:1.5rem}
ol li{padding:.75rem 0;border-bottom:1px solid #eee}
.error{color:#e53e3e;background:#fee;padding:1rem;border-radius:8px}
</style>
</head>
<body>
<header><nav><a href="index.html">Home</a><a href="about.html">About</a><a href="categories.html">Recipes</a><a href="submit-recipe.html">Submit</a></nav></header>
<main>
<h1 id="title">Loading...</h1>
<p class="author">By <span id="author"></span></p>
<p id="desc" class="desc"></p>
<div class="section"><h2>🥕 Ingredients</h2><ul id="ings"></ul></div>
<div class="section"><h2>📝 Instructions</h2><ol id="instrs"></ol></div>
</main>
<script>
// Initialize Firebase
var config={apiKey:"AIzaSyBk3w4fTG2RZGBJ7VWZg1kKvPBc5bqWlzk",authDomain:"crowdsourcedcooking.firebaseapp.com",projectId:"crowdsourcedcooking",storageBucket:"crowdsourcedcooking.firebasestorage.app",messagingSenderId:"1025589287082",appId:"1:1025589287082:web:15569e323aa2781ab858d3"};
firebase.initializeApp(config);
var db=firebase.firestore();

// Get recipe ID from URL
var params=new URLSearchParams(window.location.search);
var id=params.get("id")||params.get("recipeId");
if(!id){document.getElementById("title").innerHTML="<p class=error>No recipe ID</p>"}
else{db.collection("recipes").doc(id).get().then(function(doc){if(!doc.exists){document.getElementById("title").innerHTML="<p class=error>Recipe not found</p>";return}
var r=doc.data();document.getElementById("title").textContent=r.title||"";document.getElementById("author").textContent=r.author||"";document.getElementById("desc").textContent=r.description||"";
var ing=r.ingredients||[];document.getElementById("ings").innerHTML=ing.map(function(i){return"<li>"+i+"</li>"}).join("");
var ins=r.instructions||[];document.getElementById("instrs").innerHTML=ins.map(function(i,idx){return"<li>"+(idx+1)+". "+i+"</li>"}).join("")}).catch(function(e){document.getElementById("title").innerHTML="<p class=error>Error: "+e.message+"</p>"});}
</script>
</body>
</html>
