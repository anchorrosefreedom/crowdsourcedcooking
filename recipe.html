</div>
<button onclick="mimoRecipe()" style="background:#e76f51;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer">🔀 MiMO - Make it My Own</button>
        <button id="promote-btn" onclick="promoteRecipe()" style="display:none;background:#2a9d8f;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-left:0.5rem">🌟 Make Public</button>
<p style="margin-top:0.5rem;color:#666;font-size:0.9rem">Customize this recipe your way</p>
</div>
<script>

  function promoteRecipe() {
    var auth = firebase.auth();
    var user = auth.currentUser;
    if (!user) { alert('Please login first'); return; }
    if (!confirm('Make this recipe public? It will appear in search results and on the homepage.')) return;
    
    document.getElementById('promote-btn').textContent = 'Promoting...';
    db.collection('recipes').doc(id).update({
      isMimo: false,
      mimoFrom: firebase.firestore.FieldValue.delete()
    }).then(function() {
      alert('Recipe is now public!');
      location.reload();
    }).catch(function(e) {
      alert('Error: ' + e.message);
      document.getElementById('promote-btn').textContent = '🌟 Make Public';
    });
  }

function mimoRecipe() {
var id = new URLSearchParams(window.location.search).get("id");
window.location.href = "submit-recipe.html?mimo=" + id;
}
</script>
</main>
<script>
var params = new URLSearchParams(window.location.search);
var id = params.get("id") || params.get("recipeId");
if(!id) {
    document.getElementById("title").innerHTML = "<p class='error'>No recipe ID</p>";
} else {
    fetch("https://us-central1-crowdsourcedcooking.cloudfunctions.net/getRecipe?id=" + id)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if(data.error) throw new Error(data.error);
            document.getElementById("title").textContent = data.title || "";
            if(data.image) { var img = document.getElementById("recipe-img"); img.src = data.image; img.style.display = "block"; }
            document.getElementById("author").textContent = data.author || "";
            document.getElementById("desc").textContent = data.description || "";
            if (data.tags && data.tags.length > 0) {
                var tagsDiv = document.getElementById("tags");
                tagsDiv.innerHTML = "<strong>Tags:</strong> " + data.tags.map(function(t) { return "<span class='tag'>" + t + "</span>"; }).join(", ");
            if(data.recipeSourceLink) {
              document.getElementById("recipeSourceLink").innerHTML = "<strong>Recipe Source:</strong> <a href='" + data.recipeSourceLink + "' target='_blank'>" + data.recipeSourceLink + "</a>";
            }
            if(data.techniqueSourceLink) {
              document.getElementById("techniqueSourceLink").innerHTML = "<strong>Technique:</strong> <a href='" + data.techniqueSourceLink + "' target='_blank'>" + data.techniqueSourceLink + "</a>";
            }
            }
            var ing = data.ingredients || [];
            document.getElementById("ings").innerHTML = ing.map(function(i){return"<li>"+i+"</li>"}).join("");
            var ins = data.instructions;
if(typeof ins === "string") ins = ins ? [ins] : [];
else if(!Array.isArray(ins)) ins = [];
            document.getElementById("instrs").innerHTML = ins.map(function(i){return"<li>"+i+"</li>"}).join("");
        })
        .catch(function(e) {
            document.getElementById("title").innerHTML = "<p class='error'>Error: "+e.message+"</p>";
        });
}
</script>
<script>
var page = window.location.pathname.split("/").pop().replace(".html","") || "index";
document.querySelectorAll(".nav-links a").forEach(function(a) {
  if(a.getAttribute("href").replace(".html","") === page) a.classList.add("active");
});
