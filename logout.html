<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logging out...</title>
</head>
<body>
  <p>Logging out...</p>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyBk3w4fTG2RZGBJ7VWZg1kKvPBc5bqWlzk",
      authDomain: "crowdsourcedcooking.firebaseapp.com",
      projectId: "crowdsourcedcooking"
    });
    const auth = getAuth(app);
    
    // Clear localStorage session if it exists
    localStorage.removeItem('firebase-session');
    
    signOut(auth).then(() => {
      window.location.href = 'index.html';
    }).catch(() => {
      window.location.href = 'index.html';
    });
  </script>
<script>function toggleNav(){document.getElementById("nav-list").classList.toggle("show");}</script></body>
</html>
